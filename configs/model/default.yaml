# Model configuration
models_dir: "artifacts/models"

popularity:
  enabled: true

cooccurrence:
  enabled: true
  min_support: 2

item2vec:
  enabled: true
  vector_size: 64
  window: 5
  min_count: 2
  epochs: 20
  sg: 1  # Skip-gram
  workers: 4

implicit_als:
  enabled: true
  factors: 64
  regularization: 0.01
  iterations: 15
  alpha: 1.0

implicit_bpr:
  enabled: true
  factors: 64
  learning_rate: 0.01
  regularization: 0.01
  iterations: 100

session_cooccurrence:
  enabled: true
  history_weight: 0.3
  min_support: 2

content_boost:
  enabled: true
  cooc_weight: 0.6
  category_weight: 0.25
  text_weight: 0.15
  min_support: 2

evaluation:
  k_values: [5, 10, 20]
